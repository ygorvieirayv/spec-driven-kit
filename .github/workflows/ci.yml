name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Guard PowerShell scripts are ASCII
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          paths = (
              list(Path("scripts").glob("*.ps1"))
              + list(Path("tests").glob("*.ps1"))
              + [Path("install.ps1")]
          )
          bad = []
          for path in paths:
              data = path.read_bytes()
              if any(b > 127 for b in data):
                  bad.append(str(path))
          if bad:
              raise SystemExit("Non-ASCII bytes in: " + ", ".join(bad))
          print("ASCII guard passed:", ", ".join(str(p) for p in paths))
          PY

      - name: Validate VERSION and CHANGELOG
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          version_path = Path("VERSION")
          changelog_path = Path("CHANGELOG.md")
          if not version_path.exists():
              raise SystemExit("VERSION file is missing")
          if not changelog_path.exists():
              raise SystemExit("CHANGELOG.md file is missing")

          version = version_path.read_text(encoding="utf-8").strip()
          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", version):
              raise SystemExit(f"Invalid VERSION: {version!r}")

          changelog = changelog_path.read_text(encoding="utf-8")
          if not re.search(rf"(?m)^## \[{re.escape(version)}\](?:\s|-|$)", changelog):
              raise SystemExit(f"CHANGELOG.md has no section for VERSION {version}")

          print(f"VERSION {version} is documented in CHANGELOG.md.")
          PY

      - name: Validate install manifest coverage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          tracked = set(subprocess.check_output(["git", "ls-files"], text=True).splitlines())
          manifest = Path("scripts/kit-manifest.txt")
          allowed = {"ENGINE", "SEED", "MERGE", "SKIP"}
          seen = {}
          categories = {}
          errors = []

          for lineno, raw in enumerate(manifest.read_text(encoding="utf-8").splitlines(), 1):
              line = raw.strip()
              if not line or line.startswith("#"):
                  continue
              parts = line.split(maxsplit=1)
              if len(parts) != 2:
                  errors.append(f"{manifest}:{lineno}: invalid line")
                  continue
              category, path = parts
              if category not in allowed:
                  errors.append(f"{manifest}:{lineno}: invalid category {category}")
              if path in seen:
                  errors.append(f"{manifest}:{lineno}: duplicate path {path} (first at {seen[path]})")
              seen[path] = lineno
              categories[path] = category

          manifest_paths = set(seen)
          missing = sorted(tracked - manifest_paths)
          extra = sorted(manifest_paths - tracked)
          if missing:
              errors.append("Tracked files missing from manifest: " + ", ".join(missing))
          if extra:
              errors.append("Manifest paths not tracked by git: " + ", ".join(extra))
          for path, category in categories.items():
              if path.startswith(("tests/", ".github/", "docs/example/")) and category != "SKIP":
                  errors.append(f"Internal-only path must be SKIP: {path} ({category})")
          expected_categories = {
              ".claude/commands/sdk-cycle.md": "ENGINE",
              "scripts/export-opencode.ps1": "ENGINE",
              "scripts/export-opencode.sh": "ENGINE",
              "scripts/kit-rules.sh": "SKIP",
              "scripts/kit-rules.txt": "SKIP",
              ".specify/memory/constitution.md": "ENGINE",
              ".specify/memory/project-context.md": "SEED",
              ".specify/memory/lessons.md": "MERGE",
          }
          for path, expected in expected_categories.items():
              if categories.get(path) != expected:
                  errors.append(f"{path} must be {expected}, got {categories.get(path)!r}")
          if errors:
              raise SystemExit("\n".join(errors))
          print(f"Manifest covers {len(tracked)} tracked files.")
          PY

      - name: Validate executable kit rules
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/export-opencode.sh
          bash -n scripts/kit-rules.sh
          bash -n scripts/sdk-ci.sh
          bash -n scripts/sdk-secrets.sh
          bash -n tests/export-opencode.sh
          bash -n tests/install-path-safety.sh
          bash -n tests/kit-rules-negative.sh
          bash -n tests/sdk-ci-consumer.sh
          bash -n tests/sdk-check-graph.sh
          bash -n tests/sdk-secrets.sh
          bash scripts/kit-rules.sh
          bash tests/kit-rules-negative.sh

      - name: Cross-platform Bash and PowerShell checks
        if: runner.os == 'Linux' || runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/sdk-check.sh
          bash -n scripts/export-opencode.sh
          bash -n install.sh
          bash scripts/sdk-check.sh
          pwsh -NoProfile -File scripts/sdk-check.ps1
          bash tests/export-opencode.sh
          pwsh -NoProfile -File tests/export-opencode-wrapper.ps1
          bash tests/install-path-safety.sh
          bash tests/sdk-ci-consumer.sh
          bash tests/sdk-check-graph.sh
          if [ "$RUNNER_OS" = "Linux" ]; then
            bash tests/sdk-secrets.sh
          fi

          valid="$(mktemp -d)"
          cp -R tests/fixtures/valid/. "$valid"
          mkdir -p "$valid/scripts"
          cp scripts/sdk-check.sh scripts/sdk-check.ps1 "$valid/scripts/"
          bash "$valid/scripts/sdk-check.sh"
          pwsh -NoProfile -File "$valid/scripts/sdk-check.ps1"

          broken="$(mktemp -d)"
          cp -R tests/fixtures/broken/. "$broken"
          mkdir -p "$broken/scripts"
          cp scripts/sdk-check.sh scripts/sdk-check.ps1 "$broken/scripts/"
          if bash "$broken/scripts/sdk-check.sh"; then
            echo "Broken fixture unexpectedly passed in Bash"
            exit 1
          fi
          if pwsh -NoProfile -File "$broken/scripts/sdk-check.ps1"; then
            echo "Broken fixture unexpectedly passed in PowerShell"
            exit 1
          fi

          prepare_valid_copy() {
            local target="$1"
            cp -R tests/fixtures/valid/. "$target"
            mkdir -p "$target/scripts"
            cp scripts/sdk-check.sh scripts/sdk-check.ps1 "$target/scripts/"
          }

          expect_both_fail() {
            local target="$1" label="$2"
            if bash "$target/scripts/sdk-check.sh"; then
              echo "$label unexpectedly passed in Bash"
              exit 1
            fi
            if pwsh -NoProfile -File "$target/scripts/sdk-check.ps1"; then
              echo "$label unexpectedly passed in PowerShell"
              exit 1
            fi
          }

          expect_both_pass() {
            local target="$1" label="$2"
            bash "$target/scripts/sdk-check.sh" || {
              echo "$label unexpectedly failed in Bash"
              exit 1
            }
            pwsh -NoProfile -File "$target/scripts/sdk-check.ps1" || {
              echo "$label unexpectedly failed in PowerShell"
              exit 1
            }
          }

          append_review_entry() {
            local file="$1" eid="$2" timestamp="$3" task="$4" acs="$5"
            local result="$6" ref="$7" exit_code="$8" output="$9"
            printf '%s\n' \
              '' \
              "### $eid - $timestamp - $task - review" \
              "- **Registro:** $task | $acs | review | $result | $ref" \
              '- **Acao/comando:** `scripts/sdk-check`' \
              '- **Diretorio:** raiz do fixture' \
              '- **Fonte:** terminal em contexto fresco' \
              "- **Exit code:** $exit_code" \
              "- **Saida/referencia:** $output" \
              '- **Branch:** fixture' \
              '- **Limitacoes:** nenhuma' >> "$file"
          }

          for fault in missing-fidelity invalid-fidelity missing-profiles missing-profiles-column \
            inline-tasks risk-suffix duplicate-risk missing-state-markers; do
            target="$(mktemp -d)"
            prepare_valid_copy "$target"
            case "$fault" in
              missing-fidelity) sed -i 's/^## Limites de fidelidade$/## Limites removidos/' "$target/docs/specs/sample/spec.md" ;;
              invalid-fidelity) sed -i 's/Limites intencionais:\*\* nenhum/Limites intencionais:** talvez/' "$target/docs/specs/sample/spec.md" ;;
              missing-profiles) sed -i 's/^## Perfis de prova$/## Provas removidas/' "$target/docs/plans/sample/plan.md" ;;
              missing-profiles-column) sed -i 's/| Perfis |/| Provas |/' "$target/docs/plans/sample/tasks.md" ;;
              inline-tasks) printf '\n## Tasks\n' >> "$target/docs/plans/sample/plan.md" ;;
              risk-suffix) sed -i '/^- \*\*Risco:\*\*/s/medio/medio-extra/' "$target/docs/specs/sample/spec.md" ;;
              duplicate-risk) printf '\n- **Risco:** medio\n' >> "$target/docs/specs/sample/spec.md" ;;
              missing-state-markers) sed -i '/^- \*\*Analyze:\*\*/d; /^- \*\*Review:\*\*/d' "$target/docs/plans/sample/plan.md" ;;
            esac
            expect_both_fail "$target" "Unified contract fault: $fault"
          done

          ac_outside_column="$(mktemp -d)"
          prepare_valid_copy "$ac_outside_column"
          sed -i '/^| T1 |/s/Registrar verificacao/Registrar AC99 na descricao/' \
            "$ac_outside_column/docs/plans/sample/tasks.md"
          expect_both_pass "$ac_outside_column" "AC outside the AC column fixture"

          plan_before_tasks="$(mktemp -d)"
          prepare_valid_copy "$plan_before_tasks"
          rm "$plan_before_tasks/docs/plans/sample/tasks.md" \
            "$plan_before_tasks/docs/plans/sample/evidence.md"
          sed -i 's/^- \*\*Analyze:\*\*.*/- **Analyze:** pendente/' \
            "$plan_before_tasks/docs/plans/sample/plan.md"
          expect_both_pass "$plan_before_tasks" "Plan awaiting canonical tasks fixture"

          analyzed_without_tasks="$(mktemp -d)"
          prepare_valid_copy "$analyzed_without_tasks"
          rm "$analyzed_without_tasks/docs/plans/sample/tasks.md" \
            "$analyzed_without_tasks/docs/plans/sample/evidence.md"
          expect_both_fail "$analyzed_without_tasks" "Analyze without canonical tasks fixture"

          no_evidence="$(mktemp -d)"
          prepare_valid_copy "$no_evidence"
          rm "$no_evidence/docs/plans/sample/evidence.md"
          expect_both_fail "$no_evidence" "Missing evidence fixture"

          empty_evidence="$(mktemp -d)"
          prepare_valid_copy "$empty_evidence"
          : > "$empty_evidence/docs/plans/sample/evidence.md"
          expect_both_fail "$empty_evidence" "Empty evidence fixture"

          summary_only_evidence="$(mktemp -d)"
          prepare_valid_copy "$summary_only_evidence"
          printf '# Evidencias\n\n## Resumo\n' > "$summary_only_evidence/docs/plans/sample/evidence.md"
          expect_both_fail "$summary_only_evidence" "Evidence without canonical entries fixture"

          wrong_evidence_marker="$(mktemp -d)"
          prepare_valid_copy "$wrong_evidence_marker"
          sed -i 's#docs/plans/sample/evidence.md#docs/plans/other/evidence.md#' \
            "$wrong_evidence_marker/docs/plans/sample/tasks.md"
          expect_both_fail "$wrong_evidence_marker" "Wrong Evidence marker path fixture"

          missing_evidence_marker="$(mktemp -d)"
          prepare_valid_copy "$missing_evidence_marker"
          sed -i '/^- \*\*Evidence:\*\*/d' \
            "$missing_evidence_marker/docs/plans/sample/plan.md" \
            "$missing_evidence_marker/docs/plans/sample/tasks.md"
          expect_both_fail "$missing_evidence_marker" "Missing Evidence marker fixture"

          invalid_ref="$(mktemp -d)"
          prepare_valid_copy "$invalid_ref"
          sed -i 's/worktree@b2b5356/worktree@not-a-sha/' "$invalid_ref/docs/plans/sample/evidence.md"
          expect_both_fail "$invalid_ref" "Invalid evidence ref fixture"

          invalid_calendar_date="$(mktemp -d)"
          prepare_valid_copy "$invalid_calendar_date"
          sed -i '0,/2026-07-17T20:00:00Z/s//2026-02-31T20:00:00Z/' \
            "$invalid_calendar_date/docs/plans/sample/evidence.md"
          expect_both_fail "$invalid_calendar_date" "Invalid ISO calendar date fixture"

          duplicate_entry_id="$(mktemp -d)"
          prepare_valid_copy "$duplicate_entry_id"
          sed -i 's/^### E6 /### E5 /' "$duplicate_entry_id/docs/plans/sample/evidence.md"
          expect_both_fail "$duplicate_entry_id" "Duplicate evidence entry id fixture"

          late_failure="$(mktemp -d)"
          prepare_valid_copy "$late_failure"
          printf '%s\n' \
            '' \
            '### E7 - 2026-07-17T20:06:00Z - T3 - implement' \
            '- **Registro:** T3 | AC3 | implement | fail | worktree@b2b5356' \
            '- **Acao/comando:** `scripts/sdk-check`' \
            '- **Diretorio:** raiz do fixture' \
            '- **Fonte:** terminal' \
            '- **Exit code:** 1' \
            '- **Saida/referencia:** falha posterior observada' \
            '- **Branch:** fixture' \
            '- **Limitacoes:** nenhuma' >> "$late_failure/docs/plans/sample/evidence.md"
          expect_both_fail "$late_failure" "Late failure fixture"

          missing_blocker="$(mktemp -d)"
          prepare_valid_copy "$missing_blocker"
          sed -i '/^- \*\*Bloqueio:\*\*/d' "$missing_blocker/docs/plans/sample/evidence.md"
          expect_both_fail "$missing_blocker" "Missing blocker receipt fixture"

          positive_blocker="$(mktemp -d)"
          prepare_valid_copy "$positive_blocker"
          POSITIVE_BLOCKER_ROOT="$positive_blocker" python - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["POSITIVE_BLOCKER_ROOT"]) / "docs/plans/sample/evidence.md"
          text = path.read_text(encoding="utf-8")
          anchor = "- **Limitacoes:** nenhuma\n\n### E2"
          replacement = (
              "- **Limitacoes:** nenhuma\n"
              "- **Bloqueio:** T1 | bloqueio incoerente | remover marcador do recibo positivo\n\n### E2"
          )
          text = text.replace(anchor, replacement, 1)
          path.write_bytes(text.encode("utf-8"))
          PY
          expect_both_fail "$positive_blocker" "Blocker on positive receipt fixture"

          rejected_state="$(mktemp -d)"
          prepare_valid_copy "$rejected_state"
          sed -i 's/verification-pending/partial/g' "$rejected_state/docs/plans/sample/tasks.md"
          expect_both_fail "$rejected_state" "Rejected partial state fixture"

          wrong_task_ac="$(mktemp -d)"
          prepare_valid_copy "$wrong_task_ac"
          sed -i 's/T3 | AC3 | review/T3 | AC1 | review/' "$wrong_task_ac/docs/plans/sample/evidence.md"
          expect_both_fail "$wrong_task_ac" "Wrong task AC fixture"

          duplicate_task_id="$(mktemp -d)"
          prepare_valid_copy "$duplicate_task_id"
          sed -i '/| T3 |/a | T3 | Outra semantica para o mesmo ID | — | AC3 | `outro` | outra verificacao | done |' \
            "$duplicate_task_id/docs/plans/sample/tasks.md"
          expect_both_fail "$duplicate_task_id" "Duplicate task ID fixture"

          duplicate_ac_id="$(mktemp -d)"
          prepare_valid_copy "$duplicate_ac_id"
          DUPLICATE_AC_ROOT="$duplicate_ac_id" python - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["DUPLICATE_AC_ROOT"]) / "docs/specs/sample/spec.md"
          with path.open("ab") as stream:
              stream.write("\n- **AC3** \u2014 Outro criterio com o mesmo ID.\n".encode("utf-8"))
          PY
          expect_both_fail "$duplicate_ac_id" "Duplicate acceptance criterion ID fixture"

          bold_ac_mention_only="$(mktemp -d)"
          prepare_valid_copy "$bold_ac_mention_only"
          sed -i '/^- \*\*AC3\*\*/c\Nota: **AC3** sera definido depois.' \
            "$bold_ac_mention_only/docs/specs/sample/spec.md"
          expect_both_fail "$bold_ac_mention_only" "Bold AC mention without canonical definition fixture"

          removed_proven_task="$(mktemp -d)"
          prepare_valid_copy "$removed_proven_task"
          sed -i '/| T3 |/d' "$removed_proven_task/docs/plans/sample/tasks.md"
          expect_both_fail "$removed_proven_task" "Removed task with evidence fixture"

          missing_one_task_ac="$(mktemp -d)"
          prepare_valid_copy "$missing_one_task_ac"
          sed -i 's/| AC3 |/| AC1, AC3 |/' "$missing_one_task_ac/docs/plans/sample/tasks.md"
          expect_both_fail "$missing_one_task_ac" "Missing one declared task AC fixture"

          task_without_ac="$(mktemp -d)"
          prepare_valid_copy "$task_without_ac"
          sed -i '/| T1 |/s/| AC1 |/| — |/' "$task_without_ac/docs/plans/sample/tasks.md"
          sed -i '/\*\*Registro:\*\* T1 /s/| AC1 |/| AC3 |/' \
            "$task_without_ac/docs/plans/sample/evidence.md"
          expect_both_fail "$task_without_ac" "Strict task without declared AC fixture"

          missing_field="$(mktemp -d)"
          prepare_valid_copy "$missing_field"
          sed -i '0,/^- \*\*Fonte:\*\*/{/^- \*\*Fonte:\*\*/d;}' "$missing_field/docs/plans/sample/evidence.md"
          expect_both_fail "$missing_field" "Missing evidence field fixture"

          inconsistent_exit="$(mktemp -d)"
          prepare_valid_copy "$inconsistent_exit"
          sed -i '0,/^- \*\*Exit code:\*\* 0/s//- **Exit code:** 9/' "$inconsistent_exit/docs/plans/sample/evidence.md"
          expect_both_fail "$inconsistent_exit" "Inconsistent exit code fixture"

          header_mismatch="$(mktemp -d)"
          prepare_valid_copy "$header_mismatch"
          sed -i 's/### E5 - 2026-07-17T20:04:00Z - T3 - review/### E5 - 2026-07-17T20:04:00Z - T1 - review/' \
            "$header_mismatch/docs/plans/sample/evidence.md"
          expect_both_fail "$header_mismatch" "Evidence header mismatch fixture"

          record_outside_block="$(mktemp -d)"
          prepare_valid_copy "$record_outside_block"
          sed -i '0,/^### E1 /s//- **Registro:** T1 | AC1 | implement | pass | worktree@b2b5356\n\n&/' \
            "$record_outside_block/docs/plans/sample/evidence.md"
          expect_both_fail "$record_outside_block" "Evidence record outside block fixture"

          stale_blocker="$(mktemp -d)"
          prepare_valid_copy "$stale_blocker"
          STALE_BLOCKER_ROOT="$stale_blocker" python - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["STALE_BLOCKER_ROOT"]) / "docs/plans/sample/evidence.md"
          text = path.read_text(encoding="utf-8")
          blocker = "- **Bloqueio:** T2 | credencial externa ausente | disponibilizar a credencial de teste\n"
          text = text.replace(blocker, "")
          anchor = "- **Limitacoes:** verificacao externa ainda nao executada\n"
          text = text.replace(anchor, anchor + blocker, 1)
          path.write_bytes(text.encode("utf-8"))
          PY
          expect_both_fail "$stale_blocker" "Stale blocker fixture"

          pending_review_pass="$(mktemp -d)"
          prepare_valid_copy "$pending_review_pass"
          printf '%s\n' \
            '' \
            '### E7 - 2026-07-17T20:06:00Z - T1 - review' \
            '- **Registro:** T1 | AC1 | review | pass | commit@b2b5356' \
            '- **Acao/comando:** `scripts/sdk-check`' \
            '- **Diretorio:** raiz do fixture' \
            '- **Fonte:** terminal em contexto fresco' \
            '- **Exit code:** 0' \
            '- **Saida/referencia:** review executado sem promocao de estado' \
            '- **Branch:** fixture' \
            '- **Limitacoes:** nenhuma' >> "$pending_review_pass/docs/plans/sample/evidence.md"
          expect_both_fail "$pending_review_pass" "Pending task with completed review fixture"

          pending_hidden_failure="$(mktemp -d)"
          prepare_valid_copy "$pending_hidden_failure"
          append_review_entry "$pending_hidden_failure/docs/plans/sample/evidence.md" \
            E7 2026-07-17T20:06:00Z T1 AC1 fail commit@b2b5356 1 "review falhou"
          append_review_entry "$pending_hidden_failure/docs/plans/sample/evidence.md" \
            E8 2026-07-17T20:07:00Z T1 AC1 not-run unavailable not-applicable \
            "novo review ainda nao executado"
          expect_both_fail "$pending_hidden_failure" "Pending task hiding prior review failure fixture"

          done_bypassed_implement="$(mktemp -d)"
          prepare_valid_copy "$done_bypassed_implement"
          append_review_entry "$done_bypassed_implement/docs/plans/sample/evidence.md" \
            E7 2026-07-17T20:06:00Z T3 AC3 fail commit@b2b5356 1 "review posterior falhou"
          append_review_entry "$done_bypassed_implement/docs/plans/sample/evidence.md" \
            E8 2026-07-17T20:07:00Z T3 AC3 pass commit@b2b5356 0 \
            "review repetido sem novo implement"
          expect_both_fail "$done_bypassed_implement" \
            "Done task bypassing implement after review failure fixture"

          direct_reopen_without_reclassification="$(mktemp -d)"
          prepare_valid_copy "$direct_reopen_without_reclassification"
          sed -i '/| T3 |/s/| done |$/| verification-pending |/' \
            "$direct_reopen_without_reclassification/docs/plans/sample/tasks.md"
          printf '%s\n' \
            '' \
            '### E7 - 2026-07-17T20:06:00Z - T3 - implement' \
            '- **Registro:** T3 | AC3 | implement | pass | worktree@b2b5356' \
            '- **Acao/comando:** `scripts/sdk-check`' \
            '- **Diretorio:** raiz do fixture' \
            '- **Fonte:** terminal' \
            '- **Exit code:** 0' \
            '- **Saida/referencia:** implement direto depois de done' \
            '- **Branch:** fixture' \
            '- **Limitacoes:** nenhuma' >> \
            "$direct_reopen_without_reclassification/docs/plans/sample/evidence.md"
          expect_both_fail "$direct_reopen_without_reclassification" \
            "Direct reopen without reclassification fixture"

          masked_direct_reopen="$(mktemp -d)"
          prepare_valid_copy "$masked_direct_reopen"
          sed -i '/| T3 |/s/| done |$/| verification-pending |/' \
            "$masked_direct_reopen/docs/plans/sample/tasks.md"
          printf '%s\n' \
            '' \
            '### E7 - 2026-07-17T20:06:00Z - T3 - implement' \
            '- **Registro:** T3 | AC3 | implement | fail | worktree@b2b5356' \
            '- **Acao/comando:** `scripts/sdk-check`' \
            '- **Diretorio:** raiz do fixture' \
            '- **Fonte:** terminal' \
            '- **Exit code:** 1' \
            '- **Saida/referencia:** tentativa ilegal falhou' \
            '- **Branch:** fixture' \
            '- **Limitacoes:** nenhuma' \
            '' \
            '### E8 - 2026-07-17T20:07:00Z - T3 - implement' \
            '- **Registro:** T3 | AC3 | implement | pass | worktree@b2b5356' \
            '- **Acao/comando:** `scripts/sdk-check`' \
            '- **Diretorio:** raiz do fixture' \
            '- **Fonte:** terminal' \
            '- **Exit code:** 0' \
            '- **Saida/referencia:** tentativa posterior passou sem reclass' \
            '- **Branch:** fixture' \
            '- **Limitacoes:** nenhuma' >> "$masked_direct_reopen/docs/plans/sample/evidence.md"
          expect_both_fail "$masked_direct_reopen" "Masked direct reopen fixture"

          late_reclassification_wash="$(mktemp -d)"
          prepare_valid_copy "$late_reclassification_wash"
          sed -i '/| T3 |/s/| done |$/| verification-pending |/' \
            "$late_reclassification_wash/docs/plans/sample/tasks.md"
          printf '%s\n' \
            '' \
            '### E7 - 2026-07-17T20:06:00Z - T3 - implement' \
            '- **Registro:** T3 | AC3 | implement | pass | worktree@b2b5356' \
            '- **Acao/comando:** implement ilegal apos done' \
            '- **Diretorio:** raiz do fixture' \
            '- **Fonte:** terminal' \
            '- **Exit code:** 0' \
            '- **Saida/referencia:** implement executado sem reclassificacao previa' \
            '- **Branch:** fixture' \
            '- **Limitacoes:** nenhuma' >> "$late_reclassification_wash/docs/plans/sample/evidence.md"
          append_review_entry "$late_reclassification_wash/docs/plans/sample/evidence.md" \
            E8 2026-07-17T20:07:00Z T3 AC3 pass commit@b2b5356 0 \
            "review do implement ilegal"
          append_review_entry "$late_reclassification_wash/docs/plans/sample/evidence.md" \
