          bash "$reclassified_then_reimplemented/scripts/sdk-check.sh"
          pwsh -NoProfile -File "$reclassified_then_reimplemented/scripts/sdk-check.ps1"

          version="$(cat VERSION)"
          revision="$(git rev-parse HEAD | cut -c1-12)"
          dirty_suffix=""
          [ -z "$(git status --porcelain --untracked-files=all)" ] || dirty_suffix=".dirty"
          build="$version-dev+g$revision$dirty_suffix"
          dry_parent="$(mktemp -d)"
          dry="$dry_parent/sdk-dry-run-target"
          dry_output="$(bash install.sh --target "$dry" --dry-run --yes)"
          echo "$dry_output" | grep -q "DRY-RUN would stamp .specify/spec-driven-kit.version: none -> $build"
          test ! -e "$dry"

          target="$(mktemp -d)"
          bash install.sh --target "$target" --yes
          bash "$target/scripts/sdk-check.sh"
          while read -r category path; do
            [ -n "$category" ] || continue
            path="${path%$'\r'}"
            case "$category" in \#*) continue ;; esac
            case "$category" in
              SKIP)
                test ! -e "$target/$path" || {
                  echo "SKIP path leaked into clean install: $path"
                  exit 1
                }
                ;;
              ENGINE|SEED|MERGE)
                test -f "$target/$path" || {
                  echo "Manifest path missing from clean install: $category $path"
                  exit 1
                }
                cmp -s "$path" "$target/$path" || {
                  echo "Installed manifest file differs from source: $category $path"
                  exit 1
                }
                ;;
            esac
          done < scripts/kit-manifest.txt
          bash "$target/scripts/new-feature.sh" "Smoke Feature"
          if grep -E '<feature>|<Nome da Feature>' "$target/docs/specs/smoke-feature/spec.md"; then
            echo "new-feature.sh left template identity placeholders"
            exit 1
          fi
          test ! -e "$target/docs/plans/smoke-feature/plan.md"
          test ! -e "$target/docs/plans/smoke-feature/tasks.md"
          bash "$target/scripts/sdk-check.sh"
          test -f "$target/.specify/spec-driven-kit.version"
          test "$(cat "$target/.specify/spec-driven-kit.version")" = "$build"

          second_output="$(bash install.sh --target "$target" --yes)"
          echo "$second_output" | grep -qx "installed: $build"
          echo "$second_output" | grep -qx "source build: $build"
          echo "$second_output" | grep -q "conflicts=0"

          conflict="$(mktemp -d)"
          previous="0.0.9-dev+g000000000000"
          mkdir -p "$conflict/.claude/commands" "$conflict/.specify"
          printf 'custom\n' > "$conflict/.claude/commands/sdk-next.md"
          printf '%s\n' "$previous" > "$conflict/.specify/spec-driven-kit.version"
          conflict_output="$(bash install.sh --target "$conflict" --yes)"
          grep -qx 'custom' "$conflict/.claude/commands/sdk-next.md"
          test -f "$conflict/.claude/commands/sdk-next.md.sdk-new"
          test "$(cat "$conflict/.specify/spec-driven-kit.version")" = "$previous"
          test -f "$conflict/.specify/spec-driven-kit.pending"
          grep -qx "installed: $previous" "$conflict/.specify/spec-driven-kit.pending"
          grep -qx "target: $build" "$conflict/.specify/spec-driven-kit.pending"
          grep -qx -- '- .claude/commands/sdk-next.md' "$conflict/.specify/spec-driven-kit.pending"
          echo "$conflict_output" | grep -q 'engine_conflicts=1 merge_conflicts=0 pending_engine=1'

          cp .claude/commands/sdk-next.md "$conflict/.claude/commands/sdk-next.md"
          reconciled_output="$(bash install.sh --target "$conflict" --yes)"
          test "$(cat "$conflict/.specify/spec-driven-kit.version")" = "$build"
          test ! -e "$conflict/.specify/spec-driven-kit.pending"
          echo "$reconciled_output" | grep -q "stamped .specify/spec-driven-kit.version: $previous -> $build"

          merge="$(mktemp -d)"
          mkdir -p "$merge/.specify/memory"
          printf '# project lessons\n' > "$merge/.specify/memory/lessons.md"
          merge_output="$(bash install.sh --target "$merge" --yes)"
          test "$(cat "$merge/.specify/spec-driven-kit.version")" = "$build"
          test ! -e "$merge/.specify/spec-driven-kit.pending"
          test -f "$merge/.specify/memory/lessons.md.sdk-new"
          echo "$merge_output" | grep -q 'engine_conflicts=0 merge_conflicts=1 pending_engine=0'

          force="$(mktemp -d)"
          mkdir -p "$force/.claude/commands" "$force/docs" "$force/.github/workflows" "$force/.specify"
          printf 'custom\n' > "$force/.claude/commands/sdk-next.md"
          printf 'product-ledger\n' > "$force/docs/epics.md"
          printf 'product-workflow\n' > "$force/.github/workflows/sdk-quality.yml"
          printf '%s\n' "$previous" > "$force/.specify/spec-driven-kit.version"
          printf 'status: pending-engine-reconciliation\n' > "$force/.specify/spec-driven-kit.pending"
          bash install.sh --target "$force" --yes --force
          test -n "$(find "$force/.claude/commands" -name 'sdk-next.md.sdk-bak.*' -print -quit)"
          ! grep -qx 'custom' "$force/.claude/commands/sdk-next.md"
          grep -qx 'product-ledger' "$force/docs/epics.md"
          grep -qx 'product-workflow' "$force/.github/workflows/sdk-quality.yml"
          test "$(cat "$force/.specify/spec-driven-kit.version")" = "$build"
          test ! -e "$force/.specify/spec-driven-kit.pending"

          archive="$(mktemp -d)"
          archive_target="$(mktemp -d)"
          git archive HEAD | tar -xf - -C "$archive"
          bash "$archive/install.sh" --target "$archive_target" --yes >/dev/null
          test "$(cat "$archive_target/.specify/spec-driven-kit.version")" = "$version-dev+source.unknown"

          check_failure="$(mktemp -d)"
          cp -R tests/fixtures/broken/. "$check_failure"
          mkdir -p "$check_failure/.specify"
          printf '%s\n' "$previous" > "$check_failure/.specify/spec-driven-kit.version"
          if bash install.sh --target "$check_failure" --yes >"$check_failure/install.log" 2>&1; then
            echo "Installer advanced past a failing sdk-check"
            exit 1
          fi
          test "$(cat "$check_failure/.specify/spec-driven-kit.version")" = "$previous"
          grep -q 'sdk-check failed; version stamp was not advanced' "$check_failure/install.log"

      - name: Windows PowerShell checks
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts\sdk-check.ps1
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File tests\sdk-ci-wrapper.ps1
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File tests\export-opencode-wrapper.ps1
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File tests\install-path-safety.ps1

          $valid = Join-Path $env:RUNNER_TEMP "sdk-valid"
          New-Item -ItemType Directory -Force -Path $valid | Out-Null
          Copy-Item tests\fixtures\valid\* $valid -Recurse
          New-Item -ItemType Directory -Force -Path (Join-Path $valid "scripts") | Out-Null
          Copy-Item scripts\sdk-check.ps1 (Join-Path $valid "scripts\sdk-check.ps1")
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File (Join-Path $valid "scripts\sdk-check.ps1")

          $broken = Join-Path $env:RUNNER_TEMP "sdk-broken"
          New-Item -ItemType Directory -Force -Path $broken | Out-Null
          Copy-Item tests\fixtures\broken\* $broken -Recurse
          New-Item -ItemType Directory -Force -Path (Join-Path $broken "scripts") | Out-Null
          Copy-Item scripts\sdk-check.ps1 (Join-Path $broken "scripts\sdk-check.ps1")
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File (Join-Path $broken "scripts\sdk-check.ps1")
          if ($LASTEXITCODE -eq 0) {
            throw "Broken fixture unexpectedly passed"
          }

          $version = (Get-Content -Raw -Path VERSION).Trim()
          $revision = (& git rev-parse HEAD).Trim().Substring(0, 12).ToLowerInvariant()
          $dirtySuffix = if (@(& git status --porcelain --untracked-files=all).Count -gt 0) { ".dirty" } else { "" }
          $build = "$version-dev+g$revision$dirtySuffix"
          $dry = Join-Path $env:RUNNER_TEMP "sdk-dry-run-target"
          $dryOutput = powershell.exe -NoProfile -ExecutionPolicy Bypass -File install.ps1 -Target $dry -DryRun -Yes | Out-String
          if ($dryOutput -notmatch "DRY-RUN would stamp \.specify/spec-driven-kit\.version: none -> $([regex]::Escape($build))") {
            throw "Dry-run did not report version stamp"
          }
          if (Test-Path $dry) {
            throw "Dry-run created target"
          }

          $target = Join-Path $env:RUNNER_TEMP "sdk-install-target"
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File install.ps1 -Target $target -Yes
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File (Join-Path $target "scripts\sdk-check.ps1")
          foreach ($manifestLine in Get-Content scripts\kit-manifest.txt) {
            $trimmed = $manifestLine.Trim()
            if (-not $trimmed -or $trimmed.StartsWith('#')) { continue }
            $parts = $trimmed -split '\s+', 2
            $category = $parts[0]
            $relative = $parts[1]
            $installed = Join-Path $target ($relative -replace '/', '\')
            if ($category -eq 'SKIP') {
              if (Test-Path $installed) { throw "SKIP path leaked into clean install: $relative" }
              continue
            }
            if (-not (Test-Path $installed -PathType Leaf)) {
              throw "Manifest path missing from clean install: $category $relative"
            }
            $sourceHash = (Get-FileHash -Algorithm SHA256 -Path $relative).Hash
            $installedHash = (Get-FileHash -Algorithm SHA256 -Path $installed).Hash
            if ($sourceHash -ne $installedHash) {
              throw "Installed manifest file differs from source: $category $relative"
            }
          }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File (Join-Path $target "scripts\new-feature.ps1") "Smoke Feature"
          if ($LASTEXITCODE -ne 0) { throw "new-feature.ps1 failed on a clean install" }
          $generatedSpec = Join-Path $target "docs\specs\smoke-feature\spec.md"
          if (Select-String -Path $generatedSpec -Pattern '<feature>|<Nome da Feature>') {
            throw "new-feature.ps1 left template identity placeholders"
          }
          if (Test-Path (Join-Path $target "docs\plans\smoke-feature\plan.md")) {
            throw "new-feature.ps1 created plan before sdk-plan"
          }
          if (Test-Path (Join-Path $target "docs\plans\smoke-feature\tasks.md")) {
            throw "new-feature.ps1 created tasks before sdk-tasks"
          }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File (Join-Path $target "scripts\sdk-check.ps1")
          if ($LASTEXITCODE -ne 0) { throw "Generated feature failed sdk-check" }
          $stamp = Join-Path $target ".specify\spec-driven-kit.version"
          if (-not (Test-Path $stamp)) { throw "Version stamp missing" }
          $stampValue = (Get-Content -Raw -Path $stamp).Trim()
          if ($stampValue -ne $build) { throw "Version stamp mismatch: $stampValue" }

          $secondOutput = powershell.exe -NoProfile -ExecutionPolicy Bypass -File install.ps1 -Target $target -Yes | Out-String
          if ($secondOutput -notmatch "(?m)^installed: $([regex]::Escape($build))\r?$" -or
              $secondOutput -notmatch "(?m)^source build: $([regex]::Escape($build))\r?$") {
            throw "Second install did not report same-version update"
          }
          if ($secondOutput -notmatch "conflicts=0") { throw "Second install introduced conflicts" }

          $conflict = Join-Path $env:RUNNER_TEMP "sdk-conflict"
          $previous = "0.0.9-dev+g000000000000"
          New-Item -ItemType Directory -Force -Path (Join-Path $conflict ".claude\commands"), (Join-Path $conflict ".specify") | Out-Null
          Set-Content -Encoding ASCII -Path (Join-Path $conflict ".claude\commands\sdk-next.md") -Value "custom"
          Set-Content -Encoding ASCII -Path (Join-Path $conflict ".specify\spec-driven-kit.version") -Value $previous
          $conflictOutput = powershell.exe -NoProfile -ExecutionPolicy Bypass -File install.ps1 -Target $conflict -Yes | Out-String
          $content = Get-Content -Raw -Path (Join-Path $conflict ".claude\commands\sdk-next.md")
          if ($content.Trim() -ne "custom") { throw "Conflict file was overwritten" }
          if (-not (Test-Path (Join-Path $conflict ".claude\commands\sdk-next.md.sdk-new"))) {
            throw "Conflict sidecar was not created"
          }
          $conflictStamp = (Get-Content -Raw -Path (Join-Path $conflict ".specify\spec-driven-kit.version")).Trim()
          if ($conflictStamp -ne $previous) { throw "ENGINE conflict changed the installed stamp" }
          $pending = Join-Path $conflict ".specify\spec-driven-kit.pending"
          if (-not (Test-Path $pending)) { throw "ENGINE conflict did not create pending marker" }
          $pendingContent = Get-Content -Raw -Path $pending
          if ($pendingContent -notmatch "target: $([regex]::Escape($build))" -or
              $pendingContent -notmatch '(?m)^- \.claude/commands/sdk-next\.md$') {
            throw "Pending marker does not identify target build and ENGINE path"
          }
          if ($conflictOutput -notmatch 'engine_conflicts=1 merge_conflicts=0 pending_engine=1') {
            throw "ENGINE conflict summary was not differentiated"
          }

          Copy-Item -Force .claude\commands\sdk-next.md (Join-Path $conflict ".claude\commands\sdk-next.md")
          $reconciledOutput = powershell.exe -NoProfile -ExecutionPolicy Bypass -File install.ps1 -Target $conflict -Yes | Out-String
          $reconciledStamp = (Get-Content -Raw -Path (Join-Path $conflict ".specify\spec-driven-kit.version")).Trim()
          if ($reconciledStamp -ne $build) { throw "Reconciled rerun did not apply target build" }
          if (Test-Path $pending) { throw "Reconciled rerun did not clear pending marker" }

          $merge = Join-Path $env:RUNNER_TEMP "sdk-merge-conflict"
          New-Item -ItemType Directory -Force -Path (Join-Path $merge ".specify\memory") | Out-Null
          Set-Content -Encoding ASCII -Path (Join-Path $merge ".specify\memory\lessons.md") -Value "# project lessons"
          $mergeOutput = powershell.exe -NoProfile -ExecutionPolicy Bypass -File install.ps1 -Target $merge -Yes | Out-String
          $mergeStamp = (Get-Content -Raw -Path (Join-Path $merge ".specify\spec-driven-kit.version")).Trim()
          if ($mergeStamp -ne $build) { throw "MERGE conflict incorrectly blocked version stamp" }
          if (Test-Path (Join-Path $merge ".specify\spec-driven-kit.pending")) { throw "MERGE conflict created ENGINE pending marker" }
          if ($mergeOutput -notmatch 'engine_conflicts=0 merge_conflicts=1 pending_engine=0') {
            throw "MERGE conflict summary was not differentiated"
          }

          $force = Join-Path $env:RUNNER_TEMP "sdk-force"
          New-Item -ItemType Directory -Force -Path (Join-Path $force ".claude\commands") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $force "docs") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $force ".github\workflows"), (Join-Path $force ".specify") | Out-Null
          Set-Content -Encoding ASCII -Path (Join-Path $force ".claude\commands\sdk-next.md") -Value "custom"
          Set-Content -Encoding ASCII -Path (Join-Path $force "docs\epics.md") -Value "product-ledger"
          Set-Content -Encoding ASCII -Path (Join-Path $force ".github\workflows\sdk-quality.yml") -Value "product-workflow"
          Set-Content -Encoding ASCII -Path (Join-Path $force ".specify\spec-driven-kit.version") -Value $previous
          Set-Content -Encoding ASCII -Path (Join-Path $force ".specify\spec-driven-kit.pending") -Value "status: pending-engine-reconciliation"
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File install.ps1 -Target $force -Yes -Force
          if (-not (Get-ChildItem -Path (Join-Path $force ".claude\commands") -Filter "sdk-next.md.sdk-bak.*")) {
            throw "Backup missing"
          }
          $forceContent = Get-Content -Raw -Path (Join-Path $force ".claude\commands\sdk-next.md")
          if ($forceContent.Trim() -eq "custom") { throw "ENGINE file was not updated with -Force" }
          $seedContent = Get-Content -Raw -Path (Join-Path $force "docs\epics.md")
          if ($seedContent.Trim() -ne "product-ledger") { throw "SEED epics was overwritten" }
          $workflowContent = Get-Content -Raw -Path (Join-Path $force ".github\workflows\sdk-quality.yml")
          if ($workflowContent.Trim() -ne "product-workflow") { throw "Consumer workflow was overwritten" }
          $forceStamp = (Get-Content -Raw -Path (Join-Path $force ".specify\spec-driven-kit.version")).Trim()
          if ($forceStamp -ne $build) { throw "Forced reconciliation did not apply target build" }
          if (Test-Path (Join-Path $force ".specify\spec-driven-kit.pending")) { throw "Forced reconciliation did not clear pending marker" }

          $checkFailure = Join-Path $env:RUNNER_TEMP "sdk-check-failure"
          New-Item -ItemType Directory -Force -Path $checkFailure | Out-Null
          Copy-Item tests\fixtures\broken\* $checkFailure -Recurse
          New-Item -ItemType Directory -Force -Path (Join-Path $checkFailure ".specify") | Out-Null
          Set-Content -Encoding ASCII -Path (Join-Path $checkFailure ".specify\spec-driven-kit.version") -Value $previous
          $checkFailureOutput = powershell.exe -NoProfile -ExecutionPolicy Bypass -File install.ps1 -Target $checkFailure -Yes 2>&1 | Out-String
          if ($LASTEXITCODE -eq 0) { throw "Installer advanced past a failing sdk-check" }
          $failedStamp = (Get-Content -Raw -Path (Join-Path $checkFailure ".specify\spec-driven-kit.version")).Trim()
          if ($failedStamp -ne $previous) { throw "Failing sdk-check advanced the version stamp" }
          if ($checkFailureOutput -notmatch 'sdk-check failed with exit code 1; version stamp was not advanced') {
            throw "Failing sdk-check did not report stamp preservation"
          }

      - name: Windows Git Bash checks
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/sdk-check.sh
          bash -n scripts/kit-rules.sh
          bash -n scripts/sdk-ci.sh
          bash -n scripts/sdk-secrets.sh
          bash -n install.sh
          bash scripts/kit-rules.sh
          bash scripts/sdk-check.sh
          bash tests/kit-rules-negative.sh
          bash tests/sdk-ci-consumer.sh
          bash tests/sdk-check-graph.sh

          target="$(mktemp -d)"
          bash install.sh --target "$target" --yes
          bash "$target/scripts/sdk-check.sh"
          while read -r category path; do
            [ -n "$category" ] || continue
            path="${path%$'\r'}"
            case "$category" in \#*) continue ;; esac
            case "$category" in
              SKIP)
                test ! -e "$target/$path" || {
                  echo "SKIP path leaked into Windows Git Bash install: $path"
                  exit 1
                }
                ;;
              ENGINE|SEED|MERGE)
                test -f "$target/$path" || {
                  echo "Manifest path missing from Windows Git Bash install: $category $path"
                  exit 1
                }
                cmp -s "$path" "$target/$path" || {
                  echo "Windows Git Bash install differs from source: $category $path"
                  exit 1
                }
                ;;
            esac
          done < scripts/kit-manifest.txt

          valid="$(mktemp -d)"
          cp -R tests/fixtures/valid/. "$valid"
          mkdir -p "$valid/scripts"
          cp scripts/sdk-check.sh "$valid/scripts/"
          bash "$valid/scripts/sdk-check.sh"

          broken="$(mktemp -d)"
          cp -R tests/fixtures/broken/. "$broken"
          mkdir -p "$broken/scripts"
          cp scripts/sdk-check.sh "$broken/scripts/"
          if bash "$broken/scripts/sdk-check.sh"; then
            echo "Broken fixture unexpectedly passed in Windows Git Bash"
            exit 1
          fi

      - name: macOS smoke checks
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          for script in install.sh scripts/*.sh tests/*.sh; do
            case "$script" in
              scripts/sdk-secrets.sh|tests/sdk-secrets.sh) continue ;;
            esac
            bash -n "$script"
          done

          bash scripts/sdk-check.sh

          valid="$(mktemp -d)"
          cp -R tests/fixtures/valid/. "$valid"
          mkdir -p "$valid/scripts"
          cp scripts/sdk-check.sh "$valid/scripts/"
          bash "$valid/scripts/sdk-check.sh"

          broken="$(mktemp -d)"
          cp -R tests/fixtures/broken/. "$broken"
          mkdir -p "$broken/scripts"
          cp scripts/sdk-check.sh "$broken/scripts/"
          if bash "$broken/scripts/sdk-check.sh"; then
            echo "Broken fixture unexpectedly passed on macOS"
            exit 1
          fi

          version="$(cat VERSION)"
          revision="$(git rev-parse HEAD | cut -c1-12)"
          dirty_suffix=""
          [ -z "$(git status --porcelain --untracked-files=all)" ] || dirty_suffix=".dirty"
          build="$version-dev+g$revision$dirty_suffix"
          target="$(mktemp -d "$HOME/sdk-macos-install.XXXXXX")"
          bash install.sh --target "$target" --yes
          bash "$target/scripts/sdk-check.sh"

          bash "$target/scripts/new-feature.sh" "Smoke Feature"
          generated_spec="$target/docs/specs/smoke-feature/spec.md"
          test -f "$generated_spec"
          if grep -E '<feature>|<Nome da Feature>' "$generated_spec"; then
            echo "new-feature.sh left template identity placeholders on macOS"
            exit 1
          fi
          test ! -e "$target/docs/specs/smoke-feature/spec.md-e"
          if find "$target/docs/specs/smoke-feature" \
              \( -name '*-e' -o -name '*.tmp.*' \) -print | grep -q .; then
            echo "new-feature.sh left a backup or temporary artifact on macOS"
            exit 1
          fi
          test ! -e "$target/docs/plans/smoke-feature/plan.md"
          test ! -e "$target/docs/plans/smoke-feature/tasks.md"
          bash "$target/scripts/sdk-check.sh"

          bash "$target/scripts/export-opencode.sh"
          bash "$target/scripts/export-opencode.sh" --check
          test -f "$target/.opencode/commands/sdk-cycle.md"

          second_output="$(bash install.sh --target "$target" --yes)"
          echo "$second_output" | grep -qx "installed: $build"
          echo "$second_output" | grep -qx "source build: $build"
          echo "$second_output" | grep -q "conflicts=0"

          bash tests/install-path-safety.sh
